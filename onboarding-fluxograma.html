<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxograma de Onboarding — Campanhas EUA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --border: #1e1e2e;
    --accent-blue: #4f8ef7;
    --accent-green: #3dd68c;
    --accent-orange: #f97316;
    --accent-purple: #a78bfa;
    --accent-red: #f87171;
    --accent-yellow: #fbbf24;
    --accent-teal: #2dd4bf;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 24px 20px 80px; }

  /* TABS */
  .tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 44px; position: sticky; top: 12px; z-index: 100; }
  .tab-btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; padding: 9px 18px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all .2s; }
  .tab-btn:hover { color: var(--text); border-color: #3a3a5a; }
  .tab-btn.active { background: #fff; color: #0a0a0f; border-color: #fff; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* HEADER */
  header { text-align: center; margin-bottom: 48px; }
  header .tag { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-blue); margin-bottom: 12px; display: block; }
  header h1 { font-family: 'Syne', sans-serif; font-size: clamp(24px, 4vw, 44px); font-weight: 800; line-height: 1.1; color: #fff; margin-bottom: 10px; }
  header p { color: var(--text-dim); font-size: 14px; }

  /* FLOW */
  .flow { max-width: 940px; margin: 0 auto; display: flex; flex-direction: column; gap: 0; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 5px 12px; border-radius: 4px; display: inline-block; margin-bottom: 8px; margin-top: 36px; }
  .arrow { display: flex; flex-direction: column; align-items: center; margin: 0 auto; }
  .arrow-line { width: 2px; height: 26px; background: var(--border); }
  .arrow-tip { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid var(--border); }

  /* NODES */
  .node { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 24px; width: 100%; }
  .node-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .node-desc { font-size: 13px; color: var(--text-dim); margin-top: 6px; line-height: 1.6; }

  .node-blue   { border-color: #4f8ef740; background: #4f8ef710; }
  .node-green  { border-color: #3dd68c40; background: #3dd68c10; }
  .node-orange { border-color: #f9731640; background: #f9731610; }
  .node-purple { border-color: #a78bfa40; background: #a78bfa10; }
  .node-teal   { border-color: #2dd4bf40; background: #2dd4bf10; }
  .node-yellow { border-color: #fbbf2440; background: #fbbf2410; }
  .node-red    { border-color: #f8717140; background: #f8717110; }

  .label-blue   { background: #4f8ef720; color: var(--accent-blue); }
  .label-green  { background: #3dd68c20; color: var(--accent-green); }
  .label-orange { background: #f9731620; color: var(--accent-orange); }
  .label-purple { background: #a78bfa20; color: var(--accent-purple); }
  .label-teal   { background: #2dd4bf20; color: var(--accent-teal); }
  .label-yellow { background: #fbbf2420; color: var(--accent-yellow); }
  .label-red    { background: #f8717120; color: var(--accent-red); }

  /* CHECKLIST */
  .checklist { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .checklist li { font-size: 13px; color: var(--text-dim); display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
  .checklist li::before { content: '▸'; color: var(--accent-blue); flex-shrink: 0; margin-top: 1px; }
  .checklist li.green::before  { color: var(--accent-green); }
  .checklist li.orange::before { color: var(--accent-orange); }
  .checklist li.purple::before { color: var(--accent-purple); }
  .checklist li.teal::before   { color: var(--accent-teal); }
  .checklist li.yellow::before { color: var(--accent-yellow); }
  .checklist li.red::before    { color: var(--accent-red); }

  /* GRID */
  .branch-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
  .branch-wrap.three { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 640px) { .branch-wrap, .branch-wrap.three { grid-template-columns: 1fr; } }
  .branch-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .branch-card-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }

  /* DECISION */
  .decision { background: var(--surface); border: 1.5px dashed var(--border); border-radius: 8px; padding: 11px 16px; width: 100%; display: flex; align-items: center; gap: 10px; }
  .decision-q { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); flex: 1; }
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
  .badge-yes { background: #3dd68c20; color: var(--accent-green); }
  .badge-no  { background: #f8717120; color: var(--accent-red); }

  code { background: #1e1e2e; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-family: 'DM Mono', monospace; color: #e2e8f0; }

  /* UTILITIES */
  .divider { width: 100%; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin: 44px 0; }
  .note-box { border: 1px solid #fbbf2430; background: #fbbf2408; border-radius: 10px; padding: 16px 20px; font-size: 13px; color: var(--text-dim); line-height: 1.7; }
  .note-box strong { color: var(--accent-yellow); font-weight: 600; }
  .info-box { border: 1px solid #2dd4bf30; background: #2dd4bf08; border-radius: 10px; padding: 16px 20px; font-size: 13px; color: var(--text-dim); line-height: 1.7; }
  .info-box strong { color: var(--accent-teal); font-weight: 600; }
  .step-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 4px; }

  .hi   { color: #fff; font-weight: 600; }
  .hi-b { color: var(--accent-blue); }
  .hi-g { color: var(--accent-green); }
  .hi-o { color: var(--accent-orange); }
  .hi-p { color: var(--accent-purple); }
  .hi-t { color: var(--accent-teal); }
  .hi-y { color: var(--accent-yellow); }
  .hi-r { color: var(--accent-red); }

  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; margin-top: 12px; }
  .photo-item { background: #1a1a28; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
  .photo-item span { font-size: 16px; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('main',this)">🏠 Onboarding Geral</button>
  <button class="tab-btn" onclick="switchTab('gbp',this)">📍 Google Business Profile</button>
  <button class="tab-btn" onclick="switchTab('lsa',this)">🛡️ Local Services Ads</button>
</div>

<div id="page-main" class="page active"><header><span class="tag">Processo Interno · Gestão de Tráfego</span><h1>Onboarding de Campanhas<br>para Empresas nos EUA</h1><p>Fluxo padrão — do primeiro contato até campanhas no ar</p></header></div>

<div id="page-gbp" class="page"><header><span class="tag" style="color:var(--accent-teal)">Google Business Profile</span><h1>Google Business Profile</h1></header></div>

<div id="page-lsa" class="page"><header><span class="tag" style="color:var(--accent-purple)">Local Services Ads</span><h1>Local Services Ads</h1></header></div>

<script>
  function switchTab(tab, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    btn.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
